<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン · 夢の日本 | Dream of Nihon</title>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* ----- inherit homepage aesthetics: red/white, smooth, elegant ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #fcfaf9;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      color: #1e1b1a;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      opacity: 0;
      animation: appear 0.5s ease forwards;
    }

    @keyframes appear { to { opacity: 1; } }

    :root {
      --japan-red: #b22222;
      --japan-red-light: #fae6e6;
      --paper-white: #ffffff;
      --charcoal: #2a2523;
    }

    /* --- navbar (compact, matching homepage) --- */
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2.5rem;
      background: var(--paper-white);
      border-bottom: 2px solid var(--japan-red);
      box-shadow: 0 4px 16px -10px rgba(178, 34, 34, 0.15);
      flex-wrap: wrap;
    }

    .logo {
      font-size: 1.7rem;
      font-weight: 500;
      color: var(--japan-red);
      display: flex;
      align-items: center;
      gap: 0.4rem;
      letter-spacing: -0.3px;
    }

    .logo i {
      font-size: 1.8rem;
      color: var(--japan-red);
    }

    .nav-links a {
      text-decoration: none;
      color: var(--charcoal);
      font-weight: 500;
      margin-left: 2rem;
      transition: 0.2s;
      border-bottom: 2px solid transparent;
      padding-bottom: 4px;
    }

    .nav-links a:hover {
      border-bottom-color: var(--japan-red);
      color: var(--japan-red);
    }

    /* --- main login area : two column  traditional elegance --- */
    .login-container {
      max-width: 1200px;
      margin: 2.5rem auto 3rem;
      padding: 0 2rem;
      flex: 1;
      display: flex;
      align-items: center;
    }

    .login-panel {
      display: flex;
      background: white;
      border-radius: 48px;
      overflow: hidden;
      box-shadow: 0 28px 48px -28px rgba(178, 34, 34, 0.3);
      border: 2px solid #fcd7d7;
      width: 100%;
      min-height: 580px;
    }

    /* left side — japanese traditional visual (inspired by hero image) */
    .login-illustration {
      flex: 1 1 45%;
      background: linear-gradient(165deg, #fff1ef 0%, #ffffff 100%);
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      border-right: 2px dashed var(--japan-red);
    }

    .wave-svg {
      width: 100%;
      max-width: 280px;
      margin-bottom: 1rem;
      opacity: 0.9;
    }

    .kanji-watermark {
      font-size: 12rem;
      font-weight: 400;
      color: #b22222;
      opacity: 0.12;
      position: absolute;
      bottom: 10px;
      right: 20px;
      transform: rotate(-5deg);
      pointer-events: none;
      font-family: "Noto Serif JP", serif;
    }

    .traditional-text {
      text-align: center;
      z-index: 2;
    }

    .traditional-text h2 {
      font-size: 2.4rem;
      font-weight: 500;
      color: #321f1b;
      line-height: 1.2;
    }

    .traditional-text h2 span {
      color: var(--japan-red);
      border-bottom: 3px solid var(--japan-red);
      padding-bottom: 6px;
    }

    .traditional-text p {
      margin-top: 1.2rem;
      font-size: 1.1rem;
      color: #4d3b34;
      background: rgba(255, 240, 240, 0.7);
      padding: 0.7rem 1.8rem;
      border-radius: 40px;
      backdrop-filter: blur(4px);
    }

    /* right side — login form */
    .login-form-area {
      flex: 1 1 55%;
      padding: 3rem 3.5rem;
      background: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .login-badge {
      background: var(--japan-red-light);
      color: var(--japan-red);
      padding: 0.4rem 1.4rem;
      border-radius: 40px;
      display: inline-block;
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 1.8rem;
      border: 1px solid #f3c3c3;
      width: fit-content;
    }

    .login-form-area h3 {
      font-size: 2.2rem;
      font-weight: 500;
      color: #251e1a;
      margin-bottom: 0.5rem;
    }

    .login-sub {
      color: #5d4b42;
      margin-bottom: 2.2rem;
      border-left: 4px solid var(--japan-red);
      padding-left: 1rem;
    }

    .input-group {
      margin-bottom: 1.6rem;
    }

    .input-group label {
      display: block;
      font-weight: 500;
      color: #2c221e;
      margin-bottom: 0.4rem;
      font-size: 0.95rem;
      letter-spacing: 0.3px;
    }

    .input-wrapper {
      display: flex;
      align-items: center;
      background: #fef8f7;
      border: 1.5px solid #f0d3d3;
      border-radius: 60px;
      padding: 0.2rem 1.2rem;
      transition: 0.2s;
    }

    .input-wrapper:hover,
    .input-wrapper:focus-within {
      border-color: var(--japan-red);
      box-shadow: 0 0 0 4px #fcd7d7;
    }

    .input-wrapper i {
      color: var(--japan-red);
      font-size: 1.1rem;
      width: 28px;
    }

    .input-wrapper input {
      width: 100%;
      padding: 1rem 0.8rem 1rem 0.2rem;
      border: none;
      background: transparent;
      font-size: 1.05rem;
      outline: none;
    }

    .input-wrapper input::placeholder {
      color: #b7a099;
      font-weight: 300;
    }

    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 1rem 0 2rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      color: #3f332e;
      cursor: pointer;
    }

    .remember input[type="checkbox"] {
      accent-color: var(--japan-red);
      width: 1.1rem;
      height: 1.1rem;
    }

    .forgot-link {
      color: var(--japan-red);
      text-decoration: none;
      font-weight: 500;
      border-bottom: 1px dashed var(--japan-red);
    }

    .forgot-link:hover {
      border-bottom-style: solid;
    }

    .btn-login {
      background: var(--japan-red);
      color: white;
      border: none;
      padding: 1.2rem 2rem;
      border-radius: 60px;
      font-size: 1.3rem;
      font-weight: 500;
      width: 100%;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 8px 18px rgba(178, 34, 34, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      margin-bottom: 2rem;
    }

    .btn-login:hover {
      background: #8b1a1a;
      transform: translateY(-2px);
      box-shadow: 0 16px 24px -8px #8b1a1a;
    }

    .social-login {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }

    .social-btn {
      background: white;
      border: 1.5px solid #f0d3d3;
      border-radius: 50px;
      padding: 0.7rem 1.8rem;
      font-size: 1rem;
      font-weight: 500;
      color: var(--charcoal);
      display: flex;
      align-items: center;
      gap: 0.7rem;
      cursor: pointer;
      transition: 0.15s;
      text-decoration: none;
    }

    .social-btn i {
      color: var(--japan-red);
      font-size: 1.2rem;
    }

    .social-btn:hover {
      border-color: var(--japan-red);
      background: var(--japan-red-light);
    }

    .register-prompt {
      margin-top: 2rem;
      text-align: center;
      color: #4e413b;
    }

    .register-prompt a {
      color: var(--japan-red);
      font-weight: 600;
      text-decoration: none;
      border-bottom: 2px solid var(--japan-red);
    }

    .register-prompt a:hover {
      opacity: 0.8;
    }

    /* footer (compact) */
    .footer-compact {
      background: #1f1613;
      color: #ead7cf;
      padding: 2rem 2rem 1.5rem;
      border-top: 5px solid var(--japan-red);
      text-align: center;
      font-size: 0.95rem;
    }

    .footer-compact a {
      color: #ffbaba;
      text-decoration: none;
      margin: 0 0.8rem;
    }

    .footer-compact a:hover {
      color: white;
    }

    @media (max-width: 800px) {
      .login-panel { flex-direction: column; }
      .login-illustration { border-right: none; border-bottom: 2px dashed var(--japan-red); padding: 3rem 1rem; }
      .navbar { flex-direction: column; gap: 0.5rem; }
      .nav-links a { margin: 0 1rem; }
    }
  </style>
</head>
<body>
  <!-- same navbar as home (trimmed) -->
  <nav class="navbar">
    <div class="logo">
      <i class="fas fa-circle"></i> 夢の日本
      <span style="font-size: 0.9rem; margin-left: 5px; color:#b55a3a;">Dream of Nihon</span>
    </div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="pages/lesson-explorer.html">Lessons</a>
      <a href="pages/hiragana.html">Kana</a>
      <a href="pages/kanji.html">Kanji</a>
      <a href="pages/flashcards.html">Study</a>
      <!-- login / register not duplicated -->
    </div>
  </nav>

  <!-- login page main -->
  <div class="login-container">
    <div class="login-panel">
      <!-- left: traditional japanese art reference (like hero) -->
      <div class="login-illustration">
        <div class="kanji-watermark">拝</div>
        <!-- simple wave / torii gate inspired graphic (font awesome / ascii art) -->
        <div class="wave-svg">
          <i class="fas fa-torii-gate" style="font-size: 5rem; color: var(--japan-red); opacity: 0.5; margin-bottom: 1rem;"></i>
          <svg viewBox="0 0 200 100" style="filter: drop-shadow(0 4px 6px #f0bbbb);">
            <path d="M0,50 Q30,30 60,50 T120,50 T180,40" stroke="var(--japan-red)" stroke-width="3" fill="none" stroke-dasharray="6 6" />
            <circle cx="50" cy="60" r="6" fill="var(--japan-red)" opacity="0.7" />
            <circle cx="140" cy="55" r="6" fill="var(--japan-red)" opacity="0.7" />
          </svg>
        </div>
        <div class="traditional-text">
          <h2> <span>ようこそ</span> </h2>
          <p> <i class="fas fa-sakura" style="color: var(--japan-red);"></i> ログインして旅を続ける</p>
        </div>
        <!-- small red stamp -->
        <div style="margin-top: 2rem; background: white; padding: 0.5rem 1.5rem; border-radius: 30px; border: 2px solid var(--japan-red); font-weight: 500; color: var(--japan-red); box-shadow: 0 4px 8px #facfcf;">
          稽古 · 継続
        </div>
      </div>

      <!-- right: login form (consistent with minimal red/white) -->
      <div class="login-form-area">
        <span class="login-badge"><i class="fas fa-chevron-circle-right"></i> 会員ログイン</span>
        <h3>おかえりなさい</h3>
        <div class="login-sub"> — welcome back. enter your details</div>

        <form onsubmit="event.preventDefault(); showToast();">
          <!-- email -->
          <div class="input-group">
            <label>Email or ユーザー名</label>
            <div class="input-wrapper">
              <i class="fas fa-envelope"></i>
              <input type="email" placeholder="your@email.com" value="demo@nihon.jp" required>
            </div>
          </div>
          <!-- password -->
          <div class="input-group">
            <label>Password パスワード</label>
            <div class="input-wrapper">
              <i class="fas fa-lock"></i>
              <input type="password" placeholder="••••••••" value="dream123" required>
            </div>
          </div>

          <div class="form-options">
            <label class="remember">
              <input type="checkbox" checked>  <span>次回自動ログイン</span>
            </label>
            <a href="#" class="forgot-link">パスワード忘れた？</a>
          </div>

          <button type="submit" class="btn-login"><i class="fas fa-circle-chevron-right"></i> ログイン · Sign in</button>
        </form>

        <!-- social login -->
        <div class="social-login">
          <div class="social-btn"><i class="fab fa-google"></i> Google</div>
          <div class="social-btn"><i class="fab fa-github"></i> GitHub</div>
        </div>

        <div class="register-prompt">
          <i class="fas fa-seedling" style="color: var(--japan-red);"></i> 初めてですか / first time? <a href="pages/register.html">アカウント作成 →</a>
        </div>
      </div>
    </div>
  </div>

  <!-- mini footer (homepage style) -->
  <footer class="footer-compact">
    <div>
      <span><a href="pages/admin/dashboard.html">管理者</a> · <a href="pages/register.html">新規登録</a> · <a href="index.html">ホーム</a></span>
      <p style="margin-top: 0.8rem;">© 夢の日本 · Dream of Nihon · 和の心</p>
    </div>
  </footer>

  <!-- subtle toast (same style as home) -->
  <script>
    function showToast() {
      const toast = document.createElement('div');
      toast.style.position = 'fixed';
      toast.style.bottom = '30px';
      toast.style.right = '30px';
      toast.style.backgroundColor = '#b22222';
      toast.style.color = 'white';
      toast.style.padding = '14px 26px';
      toast.style.borderRadius = '50px';
      toast.style.boxShadow = '0 12px 24px rgba(178,34,34,0.4)';
      toast.style.zIndex = '999';
      toast.style.fontWeight = '500';
      toast.style.border = '2px solid white';
      toast.style.opacity = '0';
      toast.style.transition = 'opacity 0.4s';
      toast.innerHTML = '<i class="fas fa-check-circle" style="margin-right: 10px;"></i> ログインしました (デモ) · おかえり';
      document.body.appendChild(toast);
      setTimeout(() => { toast.style.opacity = '1'; }, 30);
      setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 500); }, 3000);
    }
    // optional – prefilled demo info hint
  </script>
  <!-- small note: all pages structure consistent with home's "pages/" links, but login page itself is pages/login.html (flat) -->
</body>
</html>
